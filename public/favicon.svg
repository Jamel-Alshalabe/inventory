<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- الخلفية: تدرج لوني احترافي -->
  <defs>
    <linearGradient id="logoGradient" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E40AF" /> <!-- Blue 800 -->
      <stop offset="100%" stop-color="#3B82F6" /> <!-- Blue 500 -->
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="100%" height="100%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- الجسم الرئيسي: شكل درع أو مكعب متطور -->
  <rect width="64" height="64" rx="16" fill="url(#logoGradient)"/>
  
  <!-- أيقونة المخزون المركزية (Box) بشكل ثلاثي الأبعاد مبسط -->
  <g filter="url(#shadow)">
    <!-- الوجه العلوي -->
    <path d="M32 16L18 22L32 28L46 22L32 16Z" fill="white" fill-opacity="0.9"/>
    <!-- الوجه الأيمن -->
    <path d="M32 28L46 22V38L32 44V28Z" fill="white" fill-opacity="0.7"/>
    <!-- الوجه الأيسر -->
    <path d="M32 28L18 22V38L32 44V28Z" fill="white" fill-opacity="0.8"/>
    
    <!-- خطوط التفاصيل لإعطاء مظهر التكنولوجيا -->
    <path d="M32 28V44" stroke="#1E40AF" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M18 22L32 28L46 22" stroke="#1E40AF" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- نقطة مؤشر "الذكاء" أو "التتبع" -->
  <circle cx="48" cy="16" r="5" fill="#10B981"/> <!-- Green 500 (Indicator) -->
  <circle cx="48" cy="16" r="2" fill="white"/>
</svg>
